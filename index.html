<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="manifest" href="./Manifest.json" />
  <link rel="apple-touch-icon" href="./icono.webp" />
  <title>Mis Buses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f5f0e8;
      --surface:   #ffffff;
      --card:      #fffdf9;
      --border:    #e2d9c8;
      --text:      #1c1812;
      --muted:     #8a7f6e;
      --accent:    #e8640a;
      --accent2:   #2d6a4f;
      --accent3:   #1d4e89;
      --danger:    #c0392b;
      --shadow:    0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 6px 24px rgba(0,0,0,0.12);
      --shadow-xl: 0 12px 32px rgba(0,0,0,0.18);
      --radius:    16px;
      --radius-sm: 10px;
      --ease:      cubic-bezier(0.34, 1.56, 0.64, 1);  /* spring */
      --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--text);
      color: #fff;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header .logo {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .app-header .logo span { color: var(--accent); }
    .app-header .sub { font-size: 12px; color: #aaa; font-weight: 400; }
    .header-icon { font-size: 28px; line-height: 1; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--text);
      display: flex;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: #888;
      padding: 12px 4px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }
    .nav-btn .nav-icon {
      font-size: 22px;
      line-height: 1;
      transition: transform 0.3s var(--ease);
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active .nav-icon { transform: translateY(-2px) scale(1.15); }
    .nav-btn:active { opacity: 0.7; }
    .nav-btn:active .nav-icon { transform: scale(0.9); }

    /* ── PAGES ── */
    .page { display: none; padding: 16px 16px 100px; }
    .page.active { display: block; animation: pageFade 0.3s var(--ease-out); }
    @keyframes pageFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Stagger children on page enter */
    .page.active > * {
      animation: itemFade 0.35s var(--ease-out) both;
    }
    .page.active > *:nth-child(1) { animation-delay: 0.03s; }
    .page.active > *:nth-child(2) { animation-delay: 0.07s; }
    .page.active > *:nth-child(3) { animation-delay: 0.11s; }
    .page.active > *:nth-child(4) { animation-delay: 0.15s; }
    @keyframes itemFade {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HOME ── */
    .greeting {
      background: var(--text);
      color: #fff;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .greeting::after {
      content: '🚌';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 52px;
      opacity: 0.15;
      animation: floatBus 3s ease-in-out infinite;
    }
    @keyframes floatBus {
      0%, 100% { transform: translateY(-50%); }
      50%       { transform: translateY(calc(-50% - 6px)); }
    }
    .greeting h2 { font-family: 'Lexend', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .greeting p { color: #aaa; font-size: 14px; }

    .section-title {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
    }

    .bus-cards { display: flex; flex-direction: column; gap: 10px; }
    .bus-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease-out), border-color 0.2s;
      cursor: default;
    }
    .bus-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }
    .bus-card:active { transform: translateY(0); box-shadow: var(--shadow); }
    .bus-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .bus-icon.c1 { background: #fff3e0; }
    .bus-icon.c2 { background: #e8f5e9; }
    .bus-icon.c3 { background: #e3f2fd; }
    .bus-info { flex: 1; min-width: 0; }
    .bus-name { font-family: 'Lexend', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
    .bus-plate {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-family: 'Lexend', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 8px;
    }
    .quick-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow);
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease-out), border-color 0.2s, background 0.2s;
      font-family: 'Barlow', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .quick-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }
    .quick-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .quick-btn:hover::after { opacity: 0.04; }
    .quick-btn:active { transform: scale(0.96); box-shadow: none; }
    .quick-btn:active::after { opacity: 0.08; }
    .quick-btn .q-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .quick-btn .q-icon.fuel { background: #fff3e0; }
    .quick-btn .q-icon.pay  { background: #e8f5e9; }
    .quick-btn .q-icon.hist { background: #e3f2fd; }
    .quick-btn .q-icon.rep  { background: #fce4ec; }
    .quick-btn .q-label { font-family: 'Lexend', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .quick-btn .q-sub { font-size: 12px; color: var(--muted); }

    /* ── FORMS ── */
    .form-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
    .form-title {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-title .ft-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field select,
    .field input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      color: var(--text);
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .field select:focus,
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,100,10,0.12);
    }
    .field select,
    .field input { transition: border-color 0.2s, box-shadow 0.2s; }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 16px;
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'Lexend', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease-out), filter 0.2s;
      margin-top: 4px;
      box-shadow: 0 4px 14px rgba(232,100,10,0.35);
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left 0.5s ease;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,100,10,0.45); filter: brightness(1.08); }
    .submit-btn:hover::before { left: 150%; }
    .submit-btn:active { transform: scale(0.97) translateY(0); box-shadow: 0 2px 8px rgba(232,100,10,0.3); }
    .submit-btn.green { background: var(--accent2); box-shadow: 0 4px 14px rgba(45,106,79,0.35); }
    .submit-btn.green:hover { box-shadow: 0 6px 20px rgba(45,106,79,0.45); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .reg-tabs {
      display: flex;
      background: var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 16px;
      gap: 4px;
    }
    .reg-tab {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 10px;
      padding: 10px 6px;
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .reg-tab.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow);
    }
    .reg-form { display: none; }
    .reg-form.active { display: block; }

    /* ── CONSULTAS ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      border: 2px solid var(--border);
      background: var(--surface);
      border-radius: 20px;
      padding: 8px 16px;
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.22s var(--ease-out);
    }
    .filter-chip:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .filter-chip.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(28,24,18,0.25);
    }

    .query-filters {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .query-filters .field { margin-bottom: 10px; }
    .query-filters .field:last-child { margin-bottom: 0; }

    .search-btn {
      width: 100%;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: 'Lexend', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.22s var(--ease), box-shadow 0.22s var(--ease-out), filter 0.2s;
      box-shadow: 0 4px 14px rgba(28,24,18,0.2);
    }
    .search-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(28,24,18,0.3); filter: brightness(1.1); }
    .search-btn:active { transform: scale(0.97); box-shadow: none; }
    .search-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .results-area { margin-top: 14px; }
    .result-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: transform 0.22s var(--ease), box-shadow 0.22s var(--ease-out), border-color 0.2s;
    }
    .result-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border);
    }
    .result-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .result-dot.fuel { background: var(--accent); }
    .result-dot.pay  { background: var(--accent2); }
    .result-meta { flex: 1; }
    .result-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .result-title {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--text);
      line-height: 1.2;
    }
    .result-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .result-amount {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
    }
    .result-amount.fuel { color: var(--accent); }
    .result-amount.pay  { color: var(--accent2); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .e-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.5; }

    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .summary-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .summary-card .s-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .summary-card .s-val { font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); }
    .summary-card .s-val.fuel { color: var(--accent); }
    .summary-card .s-val.pay  { color: var(--accent2); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Lexend', sans-serif;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--accent2); }
    .toast.error   { background: var(--danger); }

    /* Month navigator */
    .month-nav {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .month-arrow {
      background: none;
      border: none;
      padding: 14px 20px;
      font-size: 20px;
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.2s var(--ease), color 0.15s;
      line-height: 1;
    }
    .month-arrow:hover { background: var(--border); color: var(--accent); }
    .month-arrow:first-child:hover { transform: translateX(-2px); }
    .month-arrow:last-child:hover  { transform: translateX(2px); }
    .month-arrow:active { background: var(--border); transform: scale(0.9); }
    .month-label {
      flex: 1;
      text-align: center;
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      text-transform: capitalize;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      gap: 10px;
      color: var(--muted);
      font-family: 'Lexend', sans-serif;
      font-size: 14px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: rippleAnim 0.5s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
    /* ── MODAL EDITAR ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 500;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 20px 40px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
    }
    .modal-title { font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); }
    .modal-close {
      background: var(--bg); border: none; width: 34px; height: 34px; border-radius: 50%;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted);
    }
    .btn-eliminar {
      width: 100%; background: var(--danger); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 14px;
      font-family: 'Lexend', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
    }
    .btn-eliminar:active { opacity: 0.8; }
    .btn-eliminar:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-divider { border: none; border-top: 1.5px solid var(--border); margin: 18px 0; }
    .result-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-action {
      flex: 1; border: 1.5px solid var(--border); background: var(--bg);
      border-radius: 8px; padding: 8px;
      font-family: 'Lexend', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 4px; transition: all 0.2s var(--ease-out);
    }
    .btn-action:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
    .btn-action:active { transform: scale(0.95); box-shadow: none; }
    .btn-action.edit { color: var(--accent3); }
    .btn-action.edit:hover { background: #e3f0ff; border-color: var(--accent3); }
    .btn-action.del  { color: var(--danger); }
    .btn-action.del:hover  { background: #fdecea; border-color: var(--danger); }

  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-icon">🚌</div>
    <div>
      <div class="logo">Mis <span>Buses</span></div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="greeting">

      <button class="quick-btn" onclick="goToConsulta('pago')">
        <div class="q-icon rep">📊</div>

    <div class="section-title">Mis buses</div>
    <div class="bus-cards">
      <div class="bus-card">
        <div class="bus-icon c1">🚌</div>
        <div class="bus-info"><div class="bus-name">A6W - Rojo</div></div>
        <div class="bus-plate">A6W-798</div>
      </div>
      <div class="bus-card">
        <div class="bus-icon c2">🚌</div>
        <div class="bus-info"><div class="bus-name">B3H - Blanco</div></div>
        <div class="bus-plate">B3H-708</div>
      </div>
      <div class="bus-card">
        <div class="bus-icon c3">🚌</div>
        <div class="bus-info"><div class="bus-name">V3E - Volvo</div></div>
        <div class="bus-plate">V3E-330</div>
      </div>
    </div>
  </div>

  <!-- REGISTRAR -->
  <div class="page" id="page-register">
    <div class="reg-tabs">
      <button class="reg-tab active" id="tab-combustible" onclick="switchTab('combustible')">⛽ Combustible</button>
      <button class="reg-tab" id="tab-pago" onclick="switchTab('pago')">💵 Pago Chofer</button>
    </div>

    <div class="reg-form active" id="form-combustible">
      <div class="form-card">
        <div class="form-title">
          <div class="ft-icon" style="background:#fff3e0">⛽</div>
          Registrar Combustible
        </div>
        <div class="field">
          <label>Bus</label>
          <div class="select-wrap">
            <select id="fc-bus">
              <option value="">Seleccionar bus...</option>
              <option value="bus1">A6W - Rojo (A6W-798)</option>
              <option value="bus2">B3H - Blanco (B3H-708)</option>
              <option value="bus3">V3E - Volvo (V3E-330)</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Fecha</label>
            <input type="date" id="fc-fecha" />
          </div>
          <div class="field">
            <label>Monto (S/.)</label>

          <label>Notas (opcional)</label>

    <div class="reg-form" id="form-pago">
      <div class="form-card">
        <div class="form-title">
          <div class="ft-icon" style="background:#e8f5e9">💵</div>
          Registrar Pago a Chofer
        </div>
        <div class="field">
          <label>Bus</label>
          <div class="select-wrap">
            <select id="fp-bus">
              <option value="">Seleccionar bus...</option>
              <option value="bus1">A6W - Rojo (A6W-798)</option>
              <option value="bus2">B3H - Blanco (B3H-708)</option>
              <option value="bus3">V3E - Volvo (V3E-330)</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Chofer</label>
          <input type="text" id="fp-chofer" placeholder="Nombre del chofer" autocomplete="off" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Fecha</label>
            <input type="date" id="fp-fecha" />
          </div>
          <div class="field">
            <label>Monto (S/.)</label>
            <input type="number" id="fp-monto" placeholder="Ej: 1500" min="0" step="0.01" inputmode="decimal" />
          </div>
        </div>
        <div class="field">
          <label>Notas (opcional)</label>
          <input type="text" id="fp-notas" placeholder="Ej: Pago semana del 14 al 20" />
        </div>
        <button class="submit-btn green" id="btn-guardar-pago" onclick="guardarPago()">
          ✅ Guardar Pago
        </button>
      </div>

  </div>

  <!-- CONSULTAR -->
  <div class="page" id="page-consulta">
    <div class="filter-bar">
      <button class="filter-chip active" id="chip-todo" onclick="setChip('todo')">Todo</button>
      <button class="filter-chip" id="chip-combustible" onclick="setChip('combustible')">⛽ Combustible</button>
      <button class="filter-chip" id="chip-pago" onclick="setChip('pago')">💵 Pagos</button>
    </div>
    <div class="query-filters">
      <div class="field">
        <label>Bus</label>
        <div class="select-wrap">
          <select id="q-bus" onchange="buscarRegistros()">
            <option value="">Todos los buses</option>
            <option value="bus1">A6W - Rojo (A6W-798)</option>
            <option value="bus2">B3H - Blanco (B3H-708)</option>
            <option value="bus3">V3E - Volvo (V3E-330)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Mes</label>
        <div class="month-nav">
          <button class="month-arrow" onclick="cambiarMes(-1)">&#8592;</button>
          <div class="month-label" id="month-label"></div>
          <button class="month-arrow" onclick="cambiarMes(1)">&#8594;</button>

      <button class="search-btn" id="btn-buscar" onclick="buscarRegistros()">
        🔄 Actualizar
      </button>
    </div>
    <div id="results-area" class="results-area">
      <div class="empty-state">
        <div class="e-icon">📋</div>
        <p>Seleccione filtros y presione <strong>Buscar</strong> para ver registros</p>
      </div>

  </div>


  <!-- MODAL EDITAR / ELIMINAR -->
  <div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-titulo">✏️ Editar registro</div>
        <button class="modal-close" onclick="cerrarModalForce()">✕</button>
      </div>

      <!-- Campos comunes -->
      <div class="field">
        <label>Bus</label>
        <div class="select-wrap">
          <select id="m-bus">
            <option value="bus1">A6W - Rojo (A6W-798)</option>
            <option value="bus2">B3H - Blanco (B3H-708)</option>
            <option value="bus3">V3E - Volvo (V3E-330)</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="m-fecha" />
        </div>
        <div class="field">
          <label>Monto (S/.)</label>
          <input type="number" id="m-monto" min="0" step="0.01" inputmode="decimal" />
        </div>
      </div>

      <!-- Solo para pagos -->
      <div class="field" id="m-campo-chofer" style="display:none">
        <label>Chofer</label>
        <input type="text" id="m-chofer" placeholder="Nombre del chofer" autocomplete="off" />
      </div>

      <div class="field">
        <label>Notas (opcional)</label>
        <input type="text" id="m-notas" placeholder="Notas..." />
      </div>

      <button class="submit-btn" id="btn-guardar-edicion" onclick="guardarEdicion()">
        💾 Guardar cambios
      </button>

      <hr class="modal-divider" />

      <button class="btn-eliminar" id="btn-confirmar-eliminar" onclick="confirmarEliminar()">
        🗑️ Eliminar este registro
      </button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
      <span class="nav-icon">🏠</span>Inicio
    </button>
    <button class="nav-btn" id="nav-register" onclick="showPage('register')">
      <span class="nav-icon">✏️</span>Registrar
    </button>
    <button class="nav-btn" id="nav-consulta" onclick="showPage('consulta')">
      <span class="nav-icon">🔍</span>Consultar
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    // ── CONFIG ───────────────────────────────────────────────────────
    const API_URL = 'https://qdhsujchq3rs6d6om6yhbpj6e40fqcrt.lambda-url.sa-east-1.on.aws';

    const BUSES = {
      bus1: { nombre: 'A6W - Rojo',   placa: 'A6W-798', color: 'c1' },
      bus2: { nombre: 'B3H - Blanco', placa: 'B3H-708', color: 'c2' },
      bus3: { nombre: 'V3E - Volvo',  placa: 'V3E-330', color: 'c3' },
    };

    let currentChip = 'todo';
    let selectedMonth;

    // ── NAVEGACIÓN ───────────────────────────────────────────────────
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.getElementById('nav-' + page).classList.add('active');
      window.scrollTo(0, 0);
      if (page === 'consulta') buscarRegistros();  // ← carga automática
    }
    function goToRegister(tab) { showPage('register'); switchTab(tab); }
    function goToConsulta(tipo) { showPage('consulta'); setChip(tipo); }
    function switchTab(tab) {
      document.querySelectorAll('.reg-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.reg-form').forEach(f => f.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
    }
    function setChip(chip) {
      currentChip = chip;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.getElementById('chip-' + chip).classList.add('active');
      buscarRegistros();  // ← recarga al cambiar filtro
    }

    // ── MES NAVEGADOR ────────────────────────────────────────────────
    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                   'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    function renderMonthLabel() {
      document.getElementById('month-label').textContent =
        MESES[selectedMonth.month] + ' ' + selectedMonth.year;
    }
    function cambiarMes(delta) {
      selectedMonth.month += delta;
      if (selectedMonth.month < 0)  { selectedMonth.month = 11; selectedMonth.year--; }
      if (selectedMonth.month > 11) { selectedMonth.month = 0;  selectedMonth.year++; }
      renderMonthLabel();
      buscarRegistros();  // ← recarga al cambiar mes
    }

    // ── INIT ─────────────────────────────────────────────────────────
    function fechaLocal() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;   // fecha del celular, no UTC
    }
    function setHoy() {
      const hoy = fechaLocal();
      document.getElementById('fc-fecha').value = hoy;
      document.getElementById('fp-fecha').value = hoy;
      const now = new Date();
      selectedMonth = { year: now.getFullYear(), month: now.getMonth() };
      renderMonthLabel();
    }
    function setGreeting() {
      const h = new Date().getHours();
      const g = h < 12 ? '¡Buenos días, Gino!' : h < 18 ? '¡Buenas tardes, Gino!' : '¡Buenas noches, Gino!';
      document.querySelector('.greeting h2').textContent = g + ' 👋';
    }

    // ── TOAST ────────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── VALIDAR ──────────────────────────────────────────────────────
    function validar(campos) {
      for (const [id, label] of campos) {
        const el = document.getElementById(id);
        if (!el.value.trim()) {
          showToast('⚠️ Falta: ' + label, 'error');
          el.focus();
          return false;
        }
      }
      return true;
    }

    // ── GUARDAR COMBUSTIBLE ──────────────────────────────────────────
    async function guardarCombustible() {
      if (!validar([['fc-bus','Bus'],['fc-fecha','Fecha'],['fc-monto','Monto']])) return;

      const payload = {
        tipo:  'combustible',
        bus:   document.getElementById('fc-bus').value,
        fecha: document.getElementById('fc-fecha').value,
        monto: parseFloat(document.getElementById('fc-monto').value),
        notas: document.getElementById('fc-notas').value.trim(),
      };

      await enviarRegistro(payload, 'combustible');
    }

    // ── GUARDAR PAGO ─────────────────────────────────────────────────
    async function guardarPago() {
      if (!validar([['fp-bus','Bus'],['fp-chofer','Chofer'],['fp-fecha','Fecha'],['fp-monto','Monto']])) return;

      const payload = {
        tipo:   'pago',
        bus:    document.getElementById('fp-bus').value,
        chofer: document.getElementById('fp-chofer').value.trim(),
        fecha:  document.getElementById('fp-fecha').value,
        monto:  parseFloat(document.getElementById('fp-monto').value),
        notas:  document.getElementById('fp-notas').value.trim(),
      };

      await enviarRegistro(payload, 'pago');
    }

    // ── ENVIAR A LAMBDA ──────────────────────────────────────────────
    async function enviarRegistro(payload, tipo) {
      const btnId = tipo === 'combustible' ? 'btn-guardar-comb' : 'btn-guardar-pago';
      const btn = document.getElementById(btnId);
      const textoOriginal = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        const res = await fetch(API_URL + '/registrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Error del servidor');
        }

        showToast('✅ Guardado correctamente');
        limpiarForm(tipo);

      } catch (err) {
        console.error('Error al guardar:', err);
        showToast('❌ ' + (err.message || 'No se pudo guardar. Intente de nuevo.'), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = textoOriginal;
      }
    }

    function limpiarForm(tipo) {
      const hoy = fechaLocal();
      if (tipo === 'combustible') {
        document.getElementById('fc-bus').value   = '';
        document.getElementById('fc-monto').value = '';
        document.getElementById('fc-notas').value = '';
        document.getElementById('fc-fecha').value = hoy;
      } else {
        document.getElementById('fp-bus').value    = '';
        document.getElementById('fp-chofer').value = '';
        document.getElementById('fp-monto').value  = '';
        document.getElementById('fp-notas').value  = '';
        document.getElementById('fp-fecha').value  = hoy;
      }
    }

    // ── CONSULTAR ────────────────────────────────────────────────────
    async function buscarRegistros() {
      const bus  = document.getElementById('q-bus').value;
      const tipo = currentChip === 'todo' ? '' : currentChip;
      const { year, month } = selectedMonth;
      const anio_mes = `${year}-${String(month + 1).padStart(2, '0')}`;

      const area   = document.getElementById('results-area');
      const btnBus = document.getElementById('btn-buscar');

      area.innerHTML = '<div class="loading"><div class="spinner"></div> Buscando...</div>';
      btnBus.disabled = true;

      try {
        const params = new URLSearchParams({ anio_mes });
        if (bus)  params.set('bus', bus);
        if (tipo) params.set('tipo', tipo);

        const res = await fetch(API_URL + '/consultar?' + params);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Error del servidor');
        }

        renderResults(data.registros || []);

      } catch (err) {
        console.error('Error al consultar:', err);
        area.innerHTML = `<div class="empty-state">
          <div class="e-icon">❌</div>
          <p>${err.message || 'Error al consultar. Verifique su conexión.'}</p>
        </div>`;
      } finally {
        btnBus.disabled = false;
      }
    }

    // ── FORMATEAR FECHA ──────────────────────────────────────────────
    function fmtFecha(iso) {
      // iso = "YYYY-MM-DD" → "DD/MM/YYYY"
      if (!iso || iso.length < 10) return iso;
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    // ── RENDERIZAR RESULTADOS ────────────────────────────────────────
    function renderResults(registros) {
      const area = document.getElementById('results-area');

      if (!registros.length) {
        area.innerHTML = '<div class="empty-state"><div class="e-icon">🔍</div><p>No hay registros para este mes.</p></div>';
        return;
      }

      const totalComb = registros
        .filter(r => r.tipo === 'combustible')
        .reduce((s, r) => s + parseFloat(r.monto || 0), 0);
      const totalPago = registros
        .filter(r => r.tipo === 'pago')
        .reduce((s, r) => s + parseFloat(r.monto || 0), 0);

      let html = `<div class="summary-row">
        <div class="summary-card">
          <div class="s-label">⛽ Combustible</div>
          <div class="s-val fuel">S/. ${totalComb.toFixed(2)}</div>
        </div>
        <div class="summary-card">
          <div class="s-label">💵 Pagos</div>
          <div class="s-val pay">S/. ${totalPago.toFixed(2)}</div>
        </div>
      </div>`;

      for (const r of registros) {
        const busInfo = BUSES[r.bus] || { nombre: r.bus };
        const esComb  = r.tipo === 'combustible';
        const icono   = esComb ? '⛽' : '💵';
        const clr     = esComb ? 'fuel' : 'pay';
        const detalle = esComb
          ? busInfo.nombre
          : `${busInfo.nombre} • ${r.chofer || ''}`;
        const monto = parseFloat(r.monto || 0).toFixed(2);
        const dataR  = encodeURIComponent(JSON.stringify(r));

        html += `<div class="result-item" style="flex-direction:column;align-items:stretch">
          <div style="display:flex;gap:14px;align-items:flex-start">
            <div class="result-dot ${clr}" style="margin-top:5px;flex-shrink:0"></div>
            <div class="result-meta" style="flex:1">
              <div class="result-badge">${icono} ${esComb ? 'Combustible' : 'Pago Chofer'}</div>
              <div class="result-title">${detalle}</div>
              <div class="result-sub">${fmtFecha(r.fecha)}${r.notas ? ' &nbsp;·&nbsp; ' + r.notas : ''}</div>
            </div>
            <div class="result-amount ${clr}">S/. ${monto}</div>
          </div>
          <div class="result-actions">
            <button class="btn-action edit" onclick="abrirEditar('${dataR}')">✏️ Editar</button>
            <button class="btn-action del"  onclick="abrirEliminar('${dataR}')">🗑️ Eliminar</button>
          </div>
        </div>`;
      }

      area.innerHTML = html;
      // Stagger entrance for each result card
      area.querySelectorAll('.result-item, .summary-row').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(12px)';
        el.style.transition = `opacity 0.3s ease ${i * 0.06}s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.06}s`;
        requestAnimationFrame(() => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
      });
    }

    // ── MODAL ────────────────────────────────────────────────────────
    let registroActual = null;

    function abrirEditar(dataR) {
      registroActual = JSON.parse(decodeURIComponent(dataR));
      const r = registroActual;
      document.getElementById('modal-titulo').textContent = '✏️ Editar registro';
      document.getElementById('m-bus').value   = r.bus   || '';
      document.getElementById('m-fecha').value = r.fecha || '';
      document.getElementById('m-monto').value = r.monto || '';
      document.getElementById('m-notas').value = r.notas || '';
      // Mostrar campo chofer solo para pagos
      const campoCh = document.getElementById('m-campo-chofer');
      if (r.tipo === 'pago') {
        campoCh.style.display = '';
        document.getElementById('m-chofer').value = r.chofer || '';
      } else {
        campoCh.style.display = 'none';
      }
      document.getElementById('btn-confirmar-eliminar').style.display = '';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function abrirEliminar(dataR) {
      registroActual = JSON.parse(decodeURIComponent(dataR));
      // Abrir modal directo en modo eliminar
      document.getElementById('modal-titulo').textContent = '🗑️ Eliminar registro';
      document.getElementById('m-bus').value   = registroActual.bus   || '';
      document.getElementById('m-fecha').value = registroActual.fecha || '';
      document.getElementById('m-monto').value = registroActual.monto || '';
      document.getElementById('m-notas').value = registroActual.notas || '';
      document.getElementById('m-campo-chofer').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function cerrarModal(e) {
      if (e.target === document.getElementById('modal-overlay')) cerrarModalForce();
    }
    function cerrarModalForce() {
      document.getElementById('modal-overlay').classList.remove('open');
      registroActual = null;
    }

    async function guardarEdicion() {
      if (!registroActual) return;
      const btn = document.getElementById('btn-guardar-edicion');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const payload = {
        registro_id: registroActual.registro_id,
        bus:   document.getElementById('m-bus').value,
        fecha: document.getElementById('m-fecha').value,
        monto: parseFloat(document.getElementById('m-monto').value),
        notas: document.getElementById('m-notas').value.trim(),
      };
      if (registroActual.tipo === 'pago') {
        payload.chofer = document.getElementById('m-chofer').value.trim();
      }

      try {
        const res  = await fetch(API_URL + '/editar', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error del servidor');
        showToast('✅ Registro actualizado');
        cerrarModalForce();
        buscarRegistros();
      } catch (err) {
        showToast('❌ ' + (err.message || 'No se pudo actualizar'), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Guardar cambios';
      }
    }

    async function confirmarEliminar() {
      if (!registroActual) return;
      const btn = document.getElementById('btn-confirmar-eliminar');
      btn.disabled = true;
      btn.textContent = 'Eliminando...';

      try {
        const res  = await fetch(API_URL + '/eliminar', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ registro_id: registroActual.registro_id }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error del servidor');
        showToast('🗑️ Registro eliminado');
        cerrarModalForce();
        buscarRegistros();
      } catch (err) {
        showToast('❌ ' + (err.message || 'No se pudo eliminar'), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🗑️ Eliminar este registro';
      }
    }

    // ── ARRANCAR ─────────────────────────────────────────────────────
    setHoy();
    setGreeting();

    // ── RIPPLE en botones principales ────────────────────────────────
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.submit-btn, .search-btn, .btn-eliminar');
      if (!btn || btn.disabled) return;
      const rect   = btn.getBoundingClientRect();
      const size   = Math.max(rect.width, rect.height);
      const x      = e.clientX - rect.left - size / 2;
      const y      = e.clientY - rect.top  - size / 2;
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
      btn.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });

    // ── STAGGER animación en resultados ──────────────────────────────
    const _origRender = renderResults;
    // Patch renderResults to add stagger after DOM insert
    const _renderResultsOrig = window.renderResults;
  </script>
</body>
</html>
